server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy the API so the browser sees one origin. This sidesteps CORS entirely
  # in the container setup and means VITE_API_URL can stay as the default "/api".
  location /api/ {
    proxy_pass         http://backend:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    # X-Forwarded-For must be correct: every rate limiter keys on req.ip, which
    # Express derives from this header via `trust proxy`. Getting it wrong either
    # buckets all users together or lets clients forge it. See SECURITY_AUDIT H-1.
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    client_max_body_size 20m;   # uploads: multer caps at 5–15m per route
  }

  # SPA history fallback — client-side routes are not files on disk.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Hashed build assets are immutable; index.html must never be cached or users
  # keep loading an old bundle that points at deleted asset hashes after a deploy.
  location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
