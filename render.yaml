databases:
  # ── Managed PostgreSQL ─────────────────────────────────────────────────────
  - name: pulse-db
    databaseName: pulse
    user: pulse
    plan: starter       # persistent storage, no 90-day deletion, daily backups

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: pulse-backend
    runtime: node
    rootDir: backend
    # npm ci only — no tests at deploy-build. Two reasons, both fatal:
    # 1. NODE_ENV=production applies at build time, so npm install omits
    #    devDependencies and `npm test` dies with "vitest: not found".
    # 2. Render injects the LIVE DATABASE_URL at build time; the suite contains
    #    real-DB integration tests, which would run against production data.
    # Tests run in CI (ci.yml) before anything reaches a deploy.
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Render injects the managed-DB connection string automatically
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-db
          property: connectionString
      # Auto-generated on first deploy; rotated via Render dashboard
      - key: JWT_SECRET
        generateValue: true
      # Auto-generated 32-byte key for AES-256 field encryption; rotated via Render dashboard
      - key: ENCRYPTION_KEY
        generateValue: true
      # Frontend origin for CORS — must match the deployed pulse-frontend service URL
      - key: FRONTEND_URL
        value: https://pulse-frontend.onrender.com
      # Off-host backup bucket. sync:false = must be entered in the Render
      # dashboard; the server refuses to boot in production without it (and
      # ALLOW_LOCAL_BACKUPS_ONLY is only for the self-contained compose stack).
      - key: BACKUP_S3_BUCKET
        sync: false
      # ── Monitoring ──────────────────────────────────────────────────────────
      # Slack/Discord/PagerDuty incoming-webhook URL for operational alerts
      - key: ALERT_WEBHOOK_URL
        sync: false
      # DB latency (ms) before a slow-query alert fires (two consecutive checks)
      - key: ALERT_THRESHOLD_MS
        value: 800
      # RSS memory (MB) before a memory-pressure alert fires (Render free = 512 MB)
      - key: MEMORY_ALERT_MB
        value: 450
      # Write structured JSONL logs to logs/*.log inside the container
      - key: LOG_TO_FILE
        value: true

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: pulse-frontend
    runtime: static
    rootDir: frontend
    # Deterministic install + build only; lint and tests are CI's job (ci.yml).
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set to https://pulse-backend.onrender.com/api (no trailing slash)
      - key: VITE_API_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
